<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手書き文字認識</title>
<style>
:root {
  --bg:      #0c0e14;
  --bg2:     #13161f;
  --bg3:     #1a1e2a;
  --bg4:     #222636;
  --border:  #2c3147;
  --border2: #3d4460;
  --text:    #dde2f0;
  --sub:     #6b748f;
  --ink:     #7eb8ff;
  --ink2:    #4a9eff;
  --gold:    #f5c842;
  --green:   #3ddba0;
  --red:     #ff5f5f;
  --r:       12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP','Hiragino Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

/* ===== HEADER ===== */
header{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,#2a4a7f,var(--ink2));
  display:flex;align-items:center;justify-content:center;
}
.logo-mark svg{width:18px;height:18px;fill:white;}
.logo h1{font-size:15px;font-weight:700;letter-spacing:.04em;}
.logo h1 span{color:var(--ink);font-size:11px;font-weight:400;margin-left:6px;}
.history-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;color:var(--sub);
  font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;
}
.history-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;}

/* ===== MAIN ===== */
main{flex:1;padding:20px 16px 100px;max-width:680px;margin:0 auto;width:100%;}

/* ===== MODE TABS ===== */
.mode-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;gap:4px;margin-bottom:20px;}
.mode-tab{
  flex:1;padding:9px;border:none;border-radius:7px;
  background:transparent;color:var(--sub);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:6px;transition:all .2s;font-weight:500;
}
.mode-tab svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;}
.mode-tab.active{background:var(--bg4);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.4);}

/* ===== UPLOAD ZONE ===== */
.upload-zone{
  border:2px dashed var(--border2);
  border-radius:var(--r);
  padding:32px 20px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
  position:relative;
  overflow:hidden;
  margin-bottom:16px;
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--ink2);background:rgba(74,158,255,.05);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-icon{
  width:56px;height:56px;border-radius:50%;
  background:rgba(74,158,255,.12);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;
}
.upload-icon svg{width:26px;height:26px;stroke:var(--ink);stroke-width:1.8;fill:none;}
.upload-title{font-size:15px;font-weight:600;margin-bottom:6px;}
.upload-sub{font-size:12px;color:var(--sub);}
.upload-or{
  display:flex;align-items:center;gap:12px;
  margin:12px 0;color:var(--sub);font-size:12px;
}
.upload-or::before,.upload-or::after{content:'';flex:1;height:1px;background:var(--border);}

/* ===== CAMERA BUTTON ===== */
.camera-btn{
  width:100%;padding:12px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.camera-btn:hover{border-color:var(--ink2);}
.camera-btn svg{width:18px;height:18px;stroke:var(--ink);stroke-width:2;fill:none;}

/* ===== PREVIEW ===== */
.preview-wrap{
  position:relative;border-radius:var(--r);overflow:hidden;
  background:var(--bg3);border:1px solid var(--border);
  margin-bottom:16px;
}
.preview-wrap img{width:100%;display:block;max-height:320px;object-fit:contain;}
.preview-controls{
  display:flex;justify-content:space-between;
  padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);
}
.preview-controls button{
  background:transparent;border:1px solid var(--border);
  border-radius:7px;padding:6px 14px;color:var(--sub);
  font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;
}
.preview-controls button svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;}

/* ===== OPTIONS ===== */
.options-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.opt-chip{
  padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);color:var(--sub);
  transition:all .15s;white-space:nowrap;
}
.opt-chip.active{background:rgba(74,158,255,.15);border-color:var(--ink2);color:var(--ink);}

/* ===== RECOGNIZE BUTTON ===== */
.rec-btn{
  width:100%;padding:15px;border-radius:12px;
  background:var(--ink2);border:none;
  color:white;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;letter-spacing:.02em;
}
.rec-btn:hover{background:#3a8eef;}
.rec-btn:active{transform:scale(.98);}
.rec-btn:disabled{background:var(--bg4);color:var(--sub);cursor:default;transform:none;}
.rec-btn svg{width:18px;height:18px;stroke:white;stroke-width:2.5;fill:none;}

/* ===== LOADING ===== */
.loading-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:30px 20px;text-align:center;
  margin-top:20px;display:none;
}
.loading-wrap.show{display:block;}
.loading-dots{display:flex;justify-content:center;gap:8px;margin-bottom:16px;}
.dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--ink2);animation:pulse 1.2s infinite;
}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1);}}
.loading-msg{font-size:14px;color:var(--sub);}
.loading-progress{
  width:60%;height:3px;background:var(--border);border-radius:2px;
  margin:12px auto 0;overflow:hidden;
}
.loading-bar{
  height:100%;background:var(--ink2);border-radius:2px;
  width:0%;animation:progress 3s ease-in-out forwards;
}
@keyframes progress{0%{width:0%;}60%{width:70%;}90%{width:88%;}100%{width:92%;}}

/* ===== RESULT ===== */
.result-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);margin-top:20px;overflow:hidden;
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.result-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:rgba(74,158,255,.05);
}
.result-title{
  display:flex;align-items:center;gap:8px;
  font-size:13px;font-weight:600;color:var(--ink);
}
.result-title svg{width:16px;height:16px;stroke:var(--ink);stroke-width:2;fill:none;}
.result-actions{display:flex;gap:6px;}
.action-btn{
  background:transparent;border:1px solid var(--border);
  border-radius:7px;padding:5px 12px;color:var(--sub);
  font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;
  transition:all .15s;
}
.action-btn:hover{border-color:var(--ink2);color:var(--ink);}
.action-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;}
.action-btn.copied{border-color:var(--green);color:var(--green);}
.result-text{
  padding:20px;font-size:16px;line-height:1.9;
  white-space:pre-wrap;word-break:break-all;
  min-height:80px;
}
.result-text-editable{
  width:100%;background:transparent;border:none;
  color:var(--text);font-size:16px;line-height:1.9;
  resize:vertical;min-height:80px;outline:none;
  padding:20px;font-family:inherit;
}
.result-footer{
  padding:10px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.char-count{font-size:11px;color:var(--sub);}
.confidence{
  display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sub);
}
.conf-bar{width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.conf-fill{height:100%;border-radius:2px;background:var(--green);}

/* ===== DRAW MODE ===== */
.canvas-wrap{
  background:white;border-radius:var(--r);
  border:2px solid var(--border2);overflow:hidden;
  margin-bottom:16px;position:relative;touch-action:none;
  cursor:crosshair;
}
canvas{display:block;width:100%;touch-action:none;}
.canvas-toolbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:var(--bg2);
  border-top:1px solid var(--border);flex-wrap:wrap;
}
.tool-btn{
  width:34px;height:34px;border-radius:7px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.tool-btn:hover,.tool-btn.active{border-color:var(--ink2);background:rgba(74,158,255,.1);}
.tool-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;}
.pen-sizes{display:flex;gap:4px;}
.pen-size{
  width:28px;height:28px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.pen-size.active{border-color:var(--ink2);}
.pen-dot{background:#222;border-radius:50%;}
.separator{width:1px;height:24px;background:var(--border);margin:0 2px;}

/* ===== HISTORY DRAWER ===== */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:min(340px,90vw);
  background:var(--bg2);border-left:1px solid var(--border);
  z-index:101;transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;
}
.drawer-overlay.open .drawer{transform:translateX(0);}
.drawer-header{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.drawer-header h2{font-size:15px;font-weight:700;}
.close-btn{
  background:transparent;border:none;color:var(--sub);
  cursor:pointer;padding:4px;
}
.close-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;}
.drawer-list{flex:1;overflow-y:auto;padding:12px;}
.hist-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;
  transition:border-color .15s;
}
.hist-card:hover{border-color:var(--border2);}
.hist-thumb{
  width:100%;height:80px;object-fit:cover;
  border-radius:7px;margin-bottom:8px;
}
.hist-text-preview{
  font-size:13px;line-height:1.6;color:var(--text);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  margin-bottom:6px;
}
.hist-meta{font-size:11px;color:var(--sub);}
.hist-empty{text-align:center;padding:40px 20px;color:var(--sub);}

/* ===== NOTIFY ===== */
.notify{
  position:fixed;top:70px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:var(--green);color:white;
  padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:200;
  opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;
}
.notify.show{opacity:1;transform:translateX(-50%) translateY(0);}
.notify.err{background:var(--red);}

/* ===== UTIL ===== */
.sec-label{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--sub);text-transform:uppercase;margin-bottom:8px;}
.gap{height:16px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </div>
    <h1>手書き認識 <span>AI-OCR</span></h1>
  </div>
  <button class="history-btn" onclick="openDrawer()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    履歴
  </button>
</header>

<main>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-upload" onclick="setMode('upload')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3 9 21 9"/><polyline points="9 21 9 9"/></svg>
      写真読み込み
    </button>
    <button class="mode-tab" id="tab-draw" onclick="setMode('draw')">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
      手書き入力
    </button>
  </div>

  <!-- ===== UPLOAD MODE ===== -->
  <div id="mode-upload">
    <div class="sec-label">画像を選択</div>

    <!-- Upload Zone -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
      </div>
      <div class="upload-title">画像をドラッグ＆ドロップ</div>
      <div class="upload-sub">または クリックして選択</div>
      <div class="upload-or">または</div>
    </div>

    <button class="camera-btn" onclick="openCamera()">
      <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      カメラで撮影する
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this.files[0])">

    <div class="gap"></div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap" style="display:none">
      <img id="previewImg" src="" alt="preview">
      <div class="preview-controls">
        <button onclick="clearImage()">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          クリア
        </button>
        <button onclick="rotateImage()">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          回転
        </button>
      </div>
    </div>

    <!-- Options -->
    <div class="sec-label">認識オプション</div>
    <div class="options-row">
      <div class="opt-chip active" id="opt-jp" onclick="toggleOpt('jp')">🇯🇵 日本語</div>
      <div class="opt-chip" id="opt-en" onclick="toggleOpt('en')">🇺🇸 英語</div>
      <div class="opt-chip active" id="opt-num" onclick="toggleOpt('num')">🔢 数字・記号</div>
      <div class="opt-chip" id="opt-table" onclick="toggleOpt('table')">📊 表・リスト</div>
      <div class="opt-chip" id="opt-steel" onclick="toggleOpt('steel')">🔩 鉄骨記号</div>
    </div>

    <button class="rec-btn" id="recBtn" onclick="recognize()" disabled>
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      文字を認識する
    </button>
  </div>

  <!-- ===== DRAW MODE ===== -->
  <div id="mode-draw" style="display:none">
    <div class="sec-label">ここに手書きで文字を書いてください</div>
    <div class="canvas-wrap">
      <canvas id="drawCanvas"></canvas>
      <div class="canvas-toolbar">
        <div class="pen-sizes">
          <div class="pen-size active" id="size1" onclick="setPenSize(2,'size1')"><div class="pen-dot" style="width:4px;height:4px"></div></div>
          <div class="pen-size" id="size2" onclick="setPenSize(4,'size2')"><div class="pen-dot" style="width:7px;height:7px"></div></div>
          <div class="pen-size" id="size3" onclick="setPenSize(7,'size3')"><div class="pen-dot" style="width:11px;height:11px"></div></div>
        </div>
        <div class="separator"></div>
        <button class="tool-btn" title="消しゴム" id="eraserBtn" onclick="toggleEraser()">
          <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l11-11 6 6-6.5 6.5"/><path d="M6.0 11.0 L13 18"/></svg>
        </button>
        <button class="tool-btn" title="全消去" onclick="clearCanvas()">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        </button>
        <button class="tool-btn" title="元に戻す" onclick="undoCanvas()">
          <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
        </button>
        <div class="separator"></div>
        <span style="font-size:11px;color:var(--sub);margin-left:2px;">ペン色:</span>
        <input type="color" id="penColor" value="#000000" style="width:28px;height:28px;border:none;border-radius:5px;cursor:pointer;padding:2px;background:var(--bg3);">
      </div>
    </div>

    <div class="options-row">
      <div class="opt-chip active" id="dopt-jp" onclick="toggleDOpt('jp')">🇯🇵 日本語</div>
      <div class="opt-chip" id="dopt-en" onclick="toggleDOpt('en')">🇺🇸 英語</div>
      <div class="opt-chip active" id="dopt-num" onclick="toggleDOpt('num')">🔢 数字</div>
      <div class="opt-chip" id="dopt-steel" onclick="toggleDOpt('steel')">🔩 鉄骨記号</div>
    </div>

    <button class="rec-btn" onclick="recognizeCanvas()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      手書き文字を認識する
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="loading-msg" id="loadingMsg">AIが文字を解析中...</div>
    <div class="loading-progress"><div class="loading-bar" id="loadingBar"></div></div>
  </div>

  <!-- RESULT -->
  <div class="result-wrap" id="resultWrap" style="display:none">
    <div class="result-header">
      <div class="result-title">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        認識結果
      </div>
      <div class="result-actions">
        <button class="action-btn" id="copyBtn" onclick="copyResult()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          コピー
        </button>
        <button class="action-btn" onclick="editResult()">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          編集
        </button>
      </div>
    </div>
    <textarea class="result-text-editable" id="resultTextArea" readonly></textarea>
    <div class="result-footer">
      <div class="char-count" id="charCount">0 文字</div>
      <div class="confidence">
        精度
        <div class="conf-bar"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
        <span id="confVal">—</span>
      </div>
    </div>
  </div>

</main>

<!-- HISTORY DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()">
  <div class="drawer" onclick="e=>e.stopPropagation()">
    <div class="drawer-header">
      <h2>認識履歴</h2>
      <button class="close-btn" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-list" id="drawerList"></div>
  </div>
</div>

<!-- NOTIFY -->
<div class="notify" id="notify"></div>

<script>
// ====== STATE ======
const state = {
  mode: 'upload',
  imageData: null,
  rotateAngle: 0,
  options: {jp:true, en:false, num:true, table:false, steel:false},
  doptions: {jp:true, en:false, num:true, steel:false},
  history: [],
  isLoading: false,
  penSize: 2,
  eraser: false,
};
let canvasHistory = [];

// ====== INIT ======
window.addEventListener('load', () => {
  loadHistory();
  initCanvas();
  initDragDrop();
});

// ====== MODE ======
function setMode(m) {
  state.mode = m;
  document.getElementById('mode-upload').style.display = m==='upload'?'block':'none';
  document.getElementById('mode-draw').style.display = m==='draw'?'block':'none';
  document.getElementById('tab-upload').classList.toggle('active', m==='upload');
  document.getElementById('tab-draw').classList.toggle('active', m==='draw');
  hideResult();
}

// ====== FILE HANDLING ======
function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    showNotify('画像ファイルを選択してください','err'); return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    state.imageData = e.target.result;
    state.rotateAngle = 0;
    showPreview(state.imageData);
  };
  reader.readAsDataURL(file);
}

function showPreview(src) {
  const wrap = document.getElementById('previewWrap');
  const img = document.getElementById('previewImg');
  const zone = document.getElementById('uploadZone');
  img.src = src;
  wrap.style.display = 'block';
  zone.style.display = 'none';
  document.getElementById('recBtn').disabled = false;
}

function clearImage() {
  state.imageData = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('recBtn').disabled = true;
  document.getElementById('fileInput').value = '';
  hideResult();
}

function openCamera() {
  document.getElementById('cameraInput').click();
}

function rotateImage() {
  state.rotateAngle = (state.rotateAngle + 90) % 360;
  const img = document.getElementById('previewImg');
  img.style.transform = `rotate(${state.rotateAngle}deg)`;
  const isOdd = state.rotateAngle === 90 || state.rotateAngle === 270;
  img.style.maxHeight = isOdd ? '320px' : '';
}

// ====== DRAG & DROP ======
function initDragDrop() {
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
}

// ====== OPTIONS ======
function toggleOpt(key) {
  state.options[key] = !state.options[key];
  document.getElementById('opt-'+key).classList.toggle('active', state.options[key]);
}
function toggleDOpt(key) {
  state.doptions[key] = !state.doptions[key];
  document.getElementById('dopt-'+key).classList.toggle('active', state.doptions[key]);
}

function buildPrompt(opts) {
  const langs = [];
  if(opts.jp||opts.jp===undefined) langs.push('日本語');
  if(opts.en) langs.push('英語');
  const langStr = langs.join('と');
  let prompt = `この画像に書かれている手書き文字を正確に読み取り、テキストに変換してください。\n\n`;
  prompt += `対象言語: ${langStr}\n`;
  if(opts.num) prompt += `数字・数式・記号も含めて認識してください。\n`;
  if(opts.table) prompt += `表形式・リスト形式の場合はその構造を保持してください。\n`;
  if(opts.steel) prompt += `鉄骨・建築図面の記号や断面表記（例: H-300×150×6.5×9）も正確に認識してください。\n`;
  prompt += `\n認識したテキストのみを出力してください。説明文や前置きは不要です。\n読み取れない文字は「□」で表現してください。`;
  return prompt;
}

// ====== RECOGNIZE (UPLOAD) ======
async function recognize() {
  if (!state.imageData) return;
  await doRecognize(state.imageData, state.options);
}

// ====== RECOGNIZE (CANVAS) ======
async function recognizeCanvas() {
  const canvas = document.getElementById('drawCanvas');
  const imgData = canvas.toDataURL('image/png');
  // Check if canvas is blank
  const ctx = canvas.getContext('2d');
  const px = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasContent = Array.from(px).some((v,i)=>i%4===3&&v<255);
  // The canvas bg is white, so check if any pixel differs
  let drawn = false;
  for(let i=0;i<px.length;i+=4){if(px[i]<250||px[i+1]<250||px[i+2]<250){drawn=true;break;}}
  if(!drawn){showNotify('先に文字を書いてください','err');return;}
  await doRecognize(imgData, state.doptions);
}

async function doRecognize(imgDataUrl, opts) {
  if (state.isLoading) return;
  state.isLoading = true;
  hideResult();
  showLoading(true);

  const base64 = imgDataUrl.replace(/^data:image\/\w+;base64,/, '');
  const mediaType = imgDataUrl.match(/data:(image\/\w+);/)?.[1] || 'image/jpeg';
  const msgs = [{
    loading: ['AIが文字を解析中...', '手書きパターンを認識しています...', 'テキストに変換中...']
  }];

  // Cycle loading messages
  let mi = 0;
  const msgInterval = setInterval(()=>{
    mi = (mi+1)%3;
    document.getElementById('loadingMsg').textContent = ['AIが文字を解析中...','手書きパターンを認識しています...','テキストに変換中...'][mi];
  }, 1200);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {type:'image', source:{type:'base64', media_type:mediaType, data:base64}},
            {type:'text', text: buildPrompt(opts)}
          ]
        }]
      })
    });

    clearInterval(msgInterval);
    if (!response.ok) throw new Error(`API Error: ${response.status}`);
    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    showResult(text, imgDataUrl);
  } catch(e) {
    clearInterval(msgInterval);
    showNotify('認識に失敗しました: ' + e.message, 'err');
    console.error(e);
  } finally {
    showLoading(false);
    state.isLoading = false;
  }
}

// ====== UI HELPERS ======
function showLoading(show) {
  const el = document.getElementById('loadingWrap');
  el.classList.toggle('show', show);
  if(show) {
    // reset bar animation
    const bar = document.getElementById('loadingBar');
    bar.style.animation = 'none';
    bar.offsetHeight; // reflow
    bar.style.animation = 'progress 3s ease-in-out forwards';
  }
}

function showResult(text, thumbSrc) {
  const wrap = document.getElementById('resultWrap');
  const ta = document.getElementById('resultTextArea');
  ta.value = text;
  ta.style.height = 'auto';
  ta.style.height = Math.max(ta.scrollHeight, 80) + 'px';
  document.getElementById('charCount').textContent = text.length + ' 文字';

  const conf = estimateConfidence(text);
  document.getElementById('confFill').style.width = conf + '%';
  document.getElementById('confVal').textContent = conf + '%';

  wrap.style.display = 'block';
  wrap.scrollIntoView({behavior:'smooth', block:'nearest'});

  // Save to history
  const entry = {id: Date.now(), text, thumb: thumbSrc, time: Date.now()};
  state.history.unshift(entry);
  if (state.history.length > 20) state.history.pop();
  saveHistory();
}

function estimateConfidence(text) {
  if (!text || text.length < 2) return 40;
  const badChars = (text.match(/□/g)||[]).length;
  const ratio = 1 - badChars / Math.max(text.length, 1);
  return Math.min(99, Math.max(50, Math.round(ratio * 96)));
}

function hideResult() {
  document.getElementById('resultWrap').style.display = 'none';
}

function copyResult() {
  const text = document.getElementById('resultTextArea').value;
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;"><polyline points="20 6 9 17 4 12"/></svg> コピー済`;
    showNotify('クリップボードにコピーしました');
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> コピー`;
    }, 2000);
  });
}

function editResult() {
  const ta = document.getElementById('resultTextArea');
  if (ta.readOnly) {
    ta.readOnly = false;
    ta.focus();
    ta.style.borderTop = '1px solid var(--ink2)';
    showNotify('編集モードに切り替えました');
  } else {
    ta.readOnly = true;
    ta.style.borderTop = 'none';
    document.getElementById('charCount').textContent = ta.value.length + ' 文字';
  }
}

// ====== CANVAS (DRAW MODE) ======
let isDrawing = false, lastX = 0, lastY = 0;

function initCanvas() {
  const canvas = document.getElementById('drawCanvas');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width || 340;
  canvas.width = W * dpr;
  canvas.height = 240 * dpr;
  canvas.style.height = '240px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, W, 240);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = state.penSize;
  saveCanvasSnapshot();

  // Mouse events
  canvas.addEventListener('mousedown', e => startDraw(e.offsetX, e.offsetY));
  canvas.addEventListener('mousemove', e => draw(e.offsetX, e.offsetY));
  canvas.addEventListener('mouseup', () => endDraw());
  canvas.addEventListener('mouseleave', () => endDraw());

  // Touch events
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    startDraw((t.clientX-r.left)*(canvas.width/dpr/r.width), (t.clientY-r.top)*(240/r.height));
  }, {passive:false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    draw((t.clientX-r.left)*(canvas.width/dpr/r.width), (t.clientY-r.top)*(240/r.height));
  }, {passive:false});
  canvas.addEventListener('touchend', () => endDraw(), {passive:false});
}

function startDraw(x, y) {
  isDrawing = true;
  lastX = x; lastY = y;
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.arc(x, y, state.eraser ? state.penSize*3 : state.penSize/2, 0, Math.PI*2);
  ctx.fillStyle = state.eraser ? 'white' : document.getElementById('penColor').value;
  ctx.fill();
}

function draw(x, y) {
  if (!isDrawing) return;
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.strokeStyle = state.eraser ? 'white' : document.getElementById('penColor').value;
  ctx.lineWidth = state.eraser ? state.penSize * 6 : state.penSize;
  ctx.stroke();
  lastX = x; lastY = y;
}

function endDraw() {
  if (isDrawing) { isDrawing = false; saveCanvasSnapshot(); }
}

function saveCanvasSnapshot() {
  const canvas = document.getElementById('drawCanvas');
  canvasHistory.push(canvas.toDataURL());
  if (canvasHistory.length > 20) canvasHistory.shift();
}

function clearCanvas() {
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  ctx.fillStyle = 'white';
  ctx.fillRect(0,0,canvas.width/dpr,canvas.height/dpr);
  canvasHistory = [];
  saveCanvasSnapshot();
  hideResult();
}

function undoCanvas() {
  if (canvasHistory.length <= 1) return;
  canvasHistory.pop();
  const canvas = document.getElementById('drawCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    const dpr = window.devicePixelRatio||1;
    ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
    ctx.drawImage(img,0,0,canvas.width/dpr,canvas.height/dpr);
  };
  img.src = canvasHistory[canvasHistory.length-1];
}

function setPenSize(size, id) {
  state.penSize = size;
  state.eraser = false;
  document.querySelectorAll('.pen-size').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('eraserBtn').classList.remove('active');
}

function toggleEraser() {
  state.eraser = !state.eraser;
  document.getElementById('eraserBtn').classList.toggle('active', state.eraser);
}

// ====== HISTORY ======
function saveHistory() {
  localStorage.setItem('ocr_history', JSON.stringify(state.history.map(h=>({...h, thumb: h.thumb?.substring(0,200)+'...'}))));
}

function loadHistory() {
  try {
    const d = localStorage.getItem('ocr_history');
    if (d) state.history = JSON.parse(d);
  } catch(e) {}
}

function openDrawer() {
  renderDrawer();
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
}

document.getElementById('drawerOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDrawer();
});
document.querySelector('.drawer').addEventListener('click', e => e.stopPropagation());

function renderDrawer() {
  const el = document.getElementById('drawerList');
  if (!state.history.length) {
    el.innerHTML = '<div class="hist-empty">認識履歴はありません</div>';
    return;
  }
  el.innerHTML = state.history.map(h => `
    <div class="hist-card" onclick="restoreHistory('${h.id}')">
      <div class="hist-text-preview">${h.text.replace(/</g,'&lt;')}</div>
      <div class="hist-meta">${new Date(h.time).toLocaleString('ja-JP')} · ${h.text.length}文字</div>
    </div>
  `).join('');
}

function restoreHistory(id) {
  const h = state.history.find(x=>x.id==id);
  if (!h) return;
  showResult(h.text, h.thumb || '');
  closeDrawer();
}

// ====== NOTIFY ======
let notifyTimer;
function showNotify(msg, type='') {
  const el = document.getElementById('notify');
  el.textContent = msg;
  el.className = 'notify show' + (type==='err'?' err':'');
  clearTimeout(notifyTimer);
  notifyTimer = setTimeout(()=>el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
