<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>構造図 自動監査・比較ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg-dark: #1e1e24;
            --panel-bg: #2b2b36;
            --border-color: #444;
            --text-main: #f8fafc;
            --old-color: #3b82f6; /* 青 */
            --new-color: #ef4444; /* 赤 */
            --divider-color: #22c55e; /* 緑色の極太線 */
            --input-yellow: #fff9c4; /* 入力欄用の薄い黄色 */
            --accent-green: #10b981;
        }
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            background-color: var(--bg-dark); color: var(--text-main); overflow: hidden;
        }
        header { background-color: var(--panel-bg); border-bottom: 1px solid var(--border-color); z-index: 10; }
        .toolbar { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .control-group { display: flex; align-items: center; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 5px; }
        .label-text { font-size: 0.9em; margin-right: 10px; margin-left: 10px; }
        .p-label { font-size: 1.1em; font-weight: bold; margin-right: 8px; margin-left: 15px; }
        .page-input { width: 60px; padding: 4px; font-size: 16px; border-radius: 4px; border: 1px solid #999; text-align: center; font-weight: bold; background-color: var(--input-yellow); color: #000; }
        .page-selectors { display: flex; gap: 3px; align-items: center; }
        select { padding: 4px; font-size: 16px; border-radius: 4px; border: 1px solid #999; background: #ffffff; color: #000; font-weight: bold; cursor: pointer; }
        .center-controls { display: flex; gap: 8px; }
        button { padding: 8px 16px; font-size: 13px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .btn-reset { background-color: #4b5563; color: white; }
        .btn-compare { background-color: var(--accent-green); color: white; }
        .btn-compare.active { background-color: #fff; color: var(--accent-green); border: 2px solid var(--accent-green); }
        .btn-scan { background-color: #8b5cf6; color: white; } /* スキャン用紫 */
        .btn-scan:disabled { background-color: #444; cursor: not-allowed; }

        .filename-bar { display: flex; justify-content: space-between; padding: 5px 20px; background-color: #1a1a20; font-size: 12px; border-bottom: 1px solid var(--border-color); }
        .filename-display { width: 48%; word-break: break-all; white-space: normal; min-height: 1.5em; color: #9ca3af; }

        main { display: flex; flex: 1; overflow: hidden; position: relative; }
        .pane { flex: 1; position: relative; background-color: #e5e7eb; overflow: hidden; }
        #pane-old { border-right: 10px solid var(--divider-color); }
        .pane.drag-over { background-color: #bfdbfe; border: 3px dashed #2563eb; }
        .pane.drag-over::after { content: "ここにドロップ"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #2563eb; font-weight: bold; pointer-events: none; }
        .canvas-wrapper { transform-origin: 0 0; position: absolute; top: 0; left: 0; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
        canvas { display: block; background-color: white; }
        .pane-label { position: absolute; top: 10px; left: 10px; z-index: 5; padding: 5px 12px; border-radius: 4px; font-weight: bold; color: white; pointer-events: none; }

        #pane-compare { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: #e5e7eb; z-index: 20; overflow: hidden; }
        .nudge-container { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 30; }
        .btn-nudge-reset { background-color: #f59e0b; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }

        /* スキャン結果パネル */
        #scan-results-panel {
            position: absolute; left: 20px; bottom: 20px; width: 250px; max-height: 40%;
            background: rgba(0,0,0,0.85); border-radius: 8px; z-index: 40; display: none;
            flex-direction: column; border: 1px solid var(--accent-green);
        }
        .scan-header { padding: 10px; border-bottom: 1px solid #444; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; }
        #scan-list { padding: 10px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 5px; }
        .diff-page-btn { background: var(--new-color); color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        /* スキャン中オーバーレイ */
        #scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .progress-box { width: 300px; background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin: 15px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-green); transition: width 0.1s; }

        .nudge-pad { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 50%; display: grid; grid-template-columns: 30px 30px 30px; grid-template-rows: 30px 30px 30px; gap: 5px; align-items: center; justify-items: center; }
        .nudge-btn { background: #444; border: 1px solid #666; color: white; border-radius: 4px; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .nudge-info { grid-column: 1 / 4; color: white; font-size: 10px; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="toolbar">
            <div class="control-group">
                <span style="color: var(--old-color); font-weight:bold;">■ 旧図面</span>
                <span class="label-text">ページを表示：</span>
                <input type="number" id="old-num" class="page-input" min="1" max="999" value="1">
                <span class="p-label">P:</span>
                <div class="page-selectors" id="sel-old"><select id="old-h"></select><select id="old-t"></select><select id="old-u"></select></div>
            </div>

            <div class="center-controls">
                <button class="btn-reset" onclick="resetView()">全体に戻す</button>
                <button class="btn-scan" id="start-scan" onclick="scanAllPages()">全ページ差分スキャン</button>
                <button class="btn-compare" id="toggle-compare" onclick="toggleCompareMode()">比較モード：OFF</button>
            </div>

            <div class="control-group">
                <span style="color: var(--new-color); font-weight:bold;">■ 新図面</span>
                <span class="label-text">ページを表示：</span>
                <input type="number" id="new-num" class="page-input" min="1" max="999" value="1">
                <span class="p-label">P:</span>
                <div class="page-selectors" id="sel-new"><select id="new-h"></select><select id="new-t"></select><select id="new-u"></select></div>
            </div>
        </div>
        <div class="filename-bar">
            <div class="filename-display" id="name-old">未読み込み (左にドロップ)</div>
            <div class="filename-display" id="name-new" style="text-align: right;">未読み込み (右にドロップ)</div>
        </div>
    </header>

    <main id="main-area">
        <div class="pane drop-zone" id="pane-old">
            <div class="pane-label" style="background: rgba(59, 130, 246, 0.8);">旧図面</div>
            <div class="canvas-wrapper" id="wrap-old"><canvas id="canvas-old"></canvas></div>
        </div>
        <div class="pane drop-zone" id="pane-new">
            <div class="pane-label" style="background: rgba(239, 68, 68, 0.8);">新図面</div>
            <div class="canvas-wrapper" id="wrap-new"><canvas id="canvas-new"></canvas></div>
        </div>

        <div id="pane-compare">
            <div class="pane-label" style="background: rgba(16, 185, 129, 0.9);">比較モード (青:旧 / 赤:新 / 黒:共通)</div>
            <div class="canvas-wrapper" id="wrap-comp"><canvas id="canvas-comp"></canvas></div>
            <div class="nudge-container">
                <button class="btn-nudge-reset" onclick="resetNudge()">微調整をリセット</button>
                <div class="nudge-pad">
                    <div></div><div class="nudge-btn" onclick="nudge(0,-1)">▲</div><div></div>
                    <div class="nudge-btn" onclick="nudge(-1,0)">◀</div><div style="font-size:9px;">微調整</div><div class="nudge-btn" onclick="nudge(1,0)">▶</div>
                    <div></div><div class="nudge-btn" onclick="nudge(0,1)">▼</div><div></div>
                    <div class="nudge-info">X: <span id="nudge-x">0</span>, Y: <span id="nudge-y">0</span></div>
                </div>
            </div>
        </div>

        <div id="scan-results-panel">
            <div class="scan-header"><span>食い違うページ一覧</span><button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; color:white; border:none; cursor:pointer;">×</button></div>
            <div id="scan-list"></div>
        </div>

        <div id="scan-overlay">
            <h2 id="scan-status">全ページを監査中...</h2>
            <div class="progress-box"><div id="progress-bar"></div></div>
            <p id="scan-count">0 / 0</p>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const state = {
            old: { doc: null, ctx: null, numPages: 0 },
            new: { doc: null, ctx: null, numPages: 0 },
            isCompareMode: false, scale: 0.5, translateX: 0, translateY: 0,
            nudgeX: 0, nudgeY: 0, renderScale: 2.0 // スキャン時は速度重視で2.0
        };

        // UI同期
        function syncFromSelect(prefix) {
            const h = document.getElementById(`${prefix}-h`).value;
            const t = document.getElementById(`${prefix}-t`).value;
            const u = document.getElementById(`${prefix}-u`).value;
            document.getElementById(`${prefix}-num`).value = parseInt(h)*100 + parseInt(t)*10 + parseInt(u);
        }
        function syncFromInput(prefix) {
            let val = Math.min(999, Math.max(0, parseInt(document.getElementById(`${prefix}-num`).value) || 0));
            document.getElementById(`${prefix}-num`).value = val;
            document.getElementById(`${prefix}-h`).value = Math.floor(val/100);
            document.getElementById(`${prefix}-t`).value = Math.floor((val%100)/10);
            document.getElementById(`${prefix}-u`).value = val%10;
        }
        function initControls(prefix) {
            ['h','t','u'].forEach(d => {
                const s = document.getElementById(`${prefix}-${d}`);
                for(let i=0;i<=9;i++){ const o=document.createElement('option'); o.value=i; o.text=i; s.appendChild(o); }
                s.addEventListener('change', () => { syncFromSelect(prefix); loadPage(prefix); });
            });
            document.getElementById(`${prefix}-num`).addEventListener('change', () => { syncFromInput(prefix); loadPage(prefix); });
            document.getElementById(`${prefix}-u`).value = 1; syncFromSelect(prefix);
        }
        initControls('old'); initControls('new');

        // ファイルドロップ
        ['old','new'].forEach(p => {
            const pane = document.getElementById(`pane-${p}`);
            pane.addEventListener('dragover', e => { e.preventDefault(); pane.classList.add('drag-over'); });
            pane.addEventListener('dragleave', () => pane.classList.remove('drag-over'));
            pane.addEventListener('drop', async e => {
                e.preventDefault(); pane.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if(file && file.type === 'application/pdf'){
                    const el = document.getElementById(`name-${p}`);
                    el.textContent = "読み込み中...";
                    const pdf = await pdfjsLib.getDocument(URL.createObjectURL(file)).promise;
                    state[p].doc = pdf; state[p].numPages = pdf.numPages;
                    el.textContent = `[全${pdf.numPages}P] ${file.name}`;
                    loadPage(p);
                }
            });
        });

        async function loadPage(p) {
            if(!state[p].doc) return;
            const canvas = document.getElementById(`canvas-${p}`);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            state[p].ctx = ctx;
            const num = parseInt(document.getElementById(`${p}-num`).value);
            if(num < 1 || num > state[p].numPages) return;
            const page = await state[p].doc.getPage(num);
            const vp = page.getViewport({ scale: state.renderScale });
            canvas.width = vp.width; canvas.height = vp.height;
            ctx.fillStyle = "white"; ctx.fillRect(0,0,canvas.width,canvas.height);
            await page.render({ canvasContext: ctx, viewport: vp }).promise;
            if(state.isCompareMode) renderDiff();
        }

        // 差分抽出 (1ページのスキャン用)
        function checkDiffPixels(ctxO, ctxN, w, h) {
            const dO = ctxO.getImageData(0,0,w,h).data;
            const dN = ctxN.getImageData(0,0,w,h).data;
            let diffCount = 0;
            for(let i=0; i<dO.length; i+=16) { // 速度のため間引いてチェック
                if(Math.abs(dO[i] - dN[i]) > 50) diffCount++;
            }
            return diffCount > 100; // 一定数以上のピクセル差があれば「食い違い」
        }

        // 全ページスキャン (メイン新機能)
        async function scanAllPages() {
            if(!state.old.doc || !state.new.doc) return alert("両方のPDFを読み込んでください");
            const maxPages = Math.min(state.old.numPages, state.new.numPages);
            const overlay = document.getElementById('scan-overlay');
            const bar = document.getElementById('progress-bar');
            const countText = document.getElementById('scan-count');
            const listEl = document.getElementById('scan-list');
            
            overlay.style.display = 'flex';
            listEl.innerHTML = "";
            
            const scanCanvasO = document.createElement('canvas');
            const scanCanvasN = document.createElement('canvas');
            const sCtxO = scanCanvasO.getContext('2d', {willReadFrequently:true});
            const sCtxN = scanCanvasN.getContext('2d', {willReadFrequently:true});

            for(let i=1; i<=maxPages; i++) {
                bar.style.width = `${(i/maxPages)*100}%`;
                countText.textContent = `${i} / ${maxPages} ページ目を照合中...`;

                const pageO = await state.old.doc.getPage(i);
                const pageN = await state.new.doc.getPage(i);
                const vp = pageO.getViewport({ scale: 0.5 }); // スキャンは低解像度で高速化
                
                scanCanvasO.width = scanCanvasN.width = vp.width;
                scanCanvasO.height = scanCanvasN.height = vp.height;

                await pageO.render({ canvasContext: sCtxO, viewport: vp }).promise;
                await pageN.render({ canvasContext: sCtxN, viewport: vp }).promise;

                if(checkDiffPixels(sCtxO, sCtxN, vp.width, vp.height)) {
                    const btn = document.createElement('button');
                    btn.className = 'diff-page-btn';
                    btn.textContent = `P.${i}`;
                    btn.onclick = () => {
                        document.getElementById('old-num').value = i;
                        document.getElementById('new-num').value = i;
                        syncFromInput('old'); syncFromInput('new');
                        loadPage('old'); loadPage('new');
                        if(!state.isCompareMode) toggleCompareMode();
                    };
                    listEl.appendChild(btn);
                }
            }
            overlay.style.display = 'none';
            document.getElementById('scan-results-panel').style.display = 'flex';
        }

        // 比較表示・ズーム・移動
        const mainArea = document.getElementById('main-area');
        const wrappers = [document.getElementById('wrap-old'), document.getElementById('wrap-new'), document.getElementById('wrap-comp')];

        function applyTransform() {
            const tr = `translate(${state.translateX}px, ${state.translateY}px) scale(${state.scale})`;
            wrappers.forEach(w => w.style.transform = tr);
        }
        function resetView() { state.scale = 0.5; state.translateX = 100; state.translateY = 20; applyTransform(); }
        window.onload = resetView;

        mainArea.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY * 0.001;
            let newScale = Math.max(0.05, Math.min(state.scale - delta, 5.0));
            const rect = mainArea.getBoundingClientRect();
            state.translateX = (e.clientX - rect.left) - ((e.clientX - rect.left) - state.translateX) * (newScale / state.scale);
            state.translateY = (e.clientY - rect.top) - ((e.clientY - rect.top) - state.translateY) * (newScale / state.scale);
            state.scale = newScale; applyTransform();
        }, { passive: false });

        let isDrag = false, sx, sy;
        mainArea.addEventListener('mousedown', e => { if(e.target.closest('.nudge-container')) return; isDrag = true; sx = e.clientX - state.translateX; sy = e.clientY - state.translateY; });
        window.addEventListener('mousemove', e => { if(!isDrag) return; state.translateX = e.clientX - sx; state.translateY = e.clientY - sy; applyTransform(); });
        window.addEventListener('mouseup', () => isDrag = false);

        function toggleCompareMode() {
            state.isCompareMode = !state.isCompareMode;
            const btn = document.getElementById('toggle-compare');
            btn.textContent = state.isCompareMode ? '比較モード：ON' : '比較モード：OFF';
            btn.classList.toggle('active');
            document.getElementById('pane-compare').style.display = state.isCompareMode ? 'block' : 'none';
            if(state.isCompareMode) renderDiff();
        }

        function renderDiff() {
            const cO = document.getElementById('canvas-old'), cN = document.getElementById('canvas-new'), cC = document.getElementById('canvas-comp');
            if(cO.width===0 || cN.width===0) return;
            const w = Math.max(cO.width, cN.width), h = Math.max(cO.height, cN.height);
            cC.width = w; cC.height = h;
            const ctxC = cC.getContext('2d');
            const iO = state.old.ctx.getImageData(0,0,cO.width,cO.height).data;
            const iN = state.new.ctx.getImageData(0,0,cN.width,cN.height).data;
            const iC = ctxC.createImageData(w, h), dC = iC.data;

            for(let y=0; y<h; y++) {
                for(let x=0; x<w; x++) {
                    const idx = (y*w + x)*4, nx = x-state.nudgeX, ny = y-state.nudgeY;
                    let hasO = (x<cO.width && y<cO.height && iO[(y*cO.width+x)*4]<200);
                    let hasN = (nx>=0 && nx<cN.width && ny>=0 && ny<cN.height && iN[(ny*cN.width+nx)*4]<200);
                    if(hasO && hasN) { dC[idx]=0; dC[idx+1]=0; dC[idx+2]=0; dC[idx+3]=255; }
                    else if(hasO) { dC[idx]=0; dC[idx+1]=0; dC[idx+2]=255; dC[idx+3]=255; } // 旧=青
                    else if(hasN) { dC[idx]=255; dC[idx+1]=0; dC[idx+2]=0; dC[idx+3]=255; } // 新=赤
                    else { dC[idx]=255; dC[idx+1]=255; dC[idx+2]=255; dC[idx+3]=255; }
                }
            }
            ctxC.putImageData(iC, 0, 0);
        }

        function nudge(x,y) { state.nudgeX+=x; state.nudgeY+=y; document.getElementById('nudge-x').textContent=state.nudgeX; document.getElementById('nudge-y').textContent=state.nudgeY; renderDiff(); }
        function resetNudge() { state.nudgeX=0; state.nudgeY=0; nudge(0,0); }
    </script>
</body>
</html>
